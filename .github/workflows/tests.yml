name: Tests
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run Go tests
        run: go test -v ./...
      - name: Build ftail
        run: go build -o ftail .
