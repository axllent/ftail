on:
  release:
    types: [created]

name: Build & release
jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin, freebsd, netbsd, openbsd]
        goarch: ["386", amd64, arm, arm64]
        exclude:
          - goarch: "386"
            goos: darwin
          - goarch: arm
            goos: darwin
          - goarch: arm
            goos: windows

    steps:
      - uses: actions/checkout@v6

      # build the binaries
      - uses: wangyoucao577/go-release-action@v1.55
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          binary_name: "ftail"
          pre_command: export CGO_ENABLED=0
          asset_name: ftail-${{ matrix.goos }}-${{ matrix.goarch }}
          extra_files: LICENSE README.md
          md5sum: false
          overwrite: true
          ldflags: -s -w -X "main.Version=${{ github.ref_name }}"
